<!DOCTYPE html>
<html>
<head>
  <title>Research AI - Login</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      color: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
      width: 350px;
    }
    h2 {
      text-align: center;
      margin-bottom: 24px;
      color: #6366f1;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: #94a3b8;
    }
    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #0f172a;
      color: white;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #6366f1;
    }
    .error {
      color: #ef4444;
      font-size: 12px;
      margin-top: 6px;
      min-height: 18px;
    }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #6366f1;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.2s;
    }
    button:hover {
      background: #4f46e5;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Research AI Login</h2>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="text" id="email" placeholder="Enter email" />
      <div id="email-error" class="error"></div>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter password" />
      <div id="password-error" class="error"></div>
    </div>
    <button id="login-button" onclick="handleLogin()">Login</button>
  </div>

  <script>
    function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const emailErr = document.getElementById('email-error');
      const passwordErr = document.getElementById('password-error');

      emailErr.innerText = '';
      passwordErr.innerText = '';

      if (!email) {
        emailErr.innerText = 'Email is required';
      }
      if (!password) {
        passwordErr.innerText = 'Password is required';
      }

      if (!email || !password) return;

      if (email === 'validuser@example.com' && password === 'ValidPass123!') {
        window.location.href = 'dashboard.html';
      } else {
        emailErr.innerText = 'Invalid email or password';
      }
    }
  </script>
</body>
</html>
